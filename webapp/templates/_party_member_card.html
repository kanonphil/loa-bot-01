{% if detail.error %}
<div class="member-card-error">{{ detail.error }}</div>
{% else %}
<div class="member-card">
  <div class="member-card-header">
    <span class="member-card-name">{{ detail.character_name }}</span>
    <span class="member-card-class">{{ detail.character_class }}</span>
  </div>
  <div class="member-card-stats">
    <div class="member-card-stat">
      <span class="member-card-stat-label">아이템 레벨</span>
      <span class="member-card-stat-value">{{ detail.item_level }}</span>
    </div>
    {% if detail.combat_power %}
    <div class="member-card-stat">
      <span class="member-card-stat-label">전투력</span>
      <span class="member-card-stat-value member-card-stat-cp">{{ detail.combat_power }}</span>
    </div>
    {% endif %}
  </div>
  <a class="member-card-link" href="/characters/{{ detail.character_name }}?discord_id={{ discord_id }}">자세히 보기 →</a>
</div>
{% endif %}
