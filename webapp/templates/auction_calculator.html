{% extends "base.html" %}
{% block content %}
<div class="page-content">
<h1>경매 분배금 계산기</h1>
<p class="party-meta">공대 경매에서 낙찰된 아이템의 분배금을 계산합니다. 수수료율은 게임 내 실제 값과 다를 수 있으니 확인 후 조정해주세요.</p>

<div class="calc-card">
  <label class="calc-field">
    <span class="board-write-label">낙찰가 (골드)</span>
    <input type="number" id="calc-bid" min="0" step="1" placeholder="예) 10000">
  </label>

  <label class="calc-field">
    <span class="board-write-label">인원 수</span>
    <select id="calc-party-size">
      <option value="8">8인</option>
      <option value="4">4인</option>
    </select>
  </label>

  <label class="calc-field">
    <span class="board-write-label">경매 수수료 (%)</span>
    <input type="number" id="calc-fee" min="0" max="100" step="0.1" value="5">
  </label>

  <label class="calc-checkbox">
    <input type="checkbox" id="calc-include-winner">
    낙찰자도 분배금을 받음
  </label>

  <div class="calc-result">
    <div class="calc-result-row">
      <span>수수료 차감 후 금액</span>
      <strong id="calc-result-net">0 골드</strong>
    </div>
    <div class="calc-result-row">
      <span>1인당 분배금</span>
      <strong id="calc-result-per-person">0 골드</strong>
    </div>
    <div class="calc-result-row">
      <span>낙찰자 실 부담액</span>
      <strong id="calc-result-winner-cost">0 골드</strong>
    </div>
  </div>
</div>
</div>

<script src="/static/auction-calculator.js"></script>
{% endblock %}
