{% extends "base.html" %}
{% block content %}
<div class="page-content">
<h1>경매 입찰 계산기</h1>
<p class="party-meta">공대 경매 아이템의 템 가격을 기준으로, 직접 사용할 때와 되팔 때 각각 손해를 보지 않는 입찰가를 계산합니다.</p>

<div class="calc-card">
  <label class="calc-field">
    <span class="board-write-label">템 가격 (골드)</span>
    <input type="number" id="calc-price" min="0" step="1" placeholder="예) 100000">
  </label>

  <fieldset class="calc-party-size-field">
    <legend class="board-write-label">인원</legend>
    <label class="calc-radio"><input type="radio" name="calc-party-size" value="8" checked> 8</label>
    <label class="calc-radio"><input type="radio" name="calc-party-size" value="4"> 4</label>
    <label class="calc-radio">
      <input type="radio" name="calc-party-size" value="custom" id="calc-party-size-custom-radio">
      <input type="number" id="calc-party-size-custom" min="2" step="1" value="0" disabled>
    </label>
  </fieldset>

  <div class="calc-result-section">
    <h2 class="calc-result-heading">직접사용</h2>
    <div class="calc-result-row">
      <span>입찰적정가</span>
      <strong id="calc-use-bid">0 골드</strong>
    </div>
    <div class="calc-result-row">
      <span>분배금</span>
      <strong id="calc-use-distribution">0 골드</strong>
    </div>
  </div>

  <div class="calc-result-section">
    <h2 class="calc-result-heading">판매</h2>
    <div class="calc-result-row">
      <span>수수료</span>
      <strong id="calc-sell-fee">0 골드</strong>
    </div>
    <div class="calc-result-row">
      <span>손익분기점</span>
      <strong id="calc-sell-breakeven">0 골드</strong>
    </div>
    <div class="calc-result-row">
      <span>분배금</span>
      <strong id="calc-sell-distribution">0 골드</strong>
    </div>
    <div class="calc-result-row">
      <span>판매차익</span>
      <strong id="calc-sell-profit">0 골드</strong>
    </div>
  </div>
</div>
</div>

<script src="/static/auction-calculator.js"></script>
{% endblock %}
