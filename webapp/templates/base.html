<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}로아봇{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  {% block body %}
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <img src="/static/logo.svg" alt="길드 로고">
        <span>{{ guild_name | default("길드명") }}</span>
      </div>
      <div class="sidebar-section-label">메인</div>
      <ul class="sidebar-nav">
        <li><a href="/main" class="{% if active == 'main' %}active{% endif %}">메인</a></li>
        <li><a class="disabled" title="준비중">원정대 관리 (준비중)</a></li>
        <li><a href="/raid-check" class="{% if active == 'raid_check' %}active{% endif %}">레이드 체크</a></li>
        <li><a href="/parties" class="{% if active == 'parties' %}active{% endif %}">공대 모집</a></li>
      </ul>
      <div class="sidebar-section-label">AI 상담</div>
      <ul class="sidebar-nav">
        <li><a href="/home" class="nav-primary">+ 새 채팅</a></li>
      </ul>
      <div class="sidebar-section-label">최근</div>
      <ul class="sidebar-sessions">
        {% for s in recent_sessions | default([]) %}
        <li><a href="/chat/{{ s.id }}" class="{% if active_session_id == s.id %}active{% endif %}" title="{{ s.title }}">{{ s.title }}</a></li>
        {% endfor %}
      </ul>
      <div class="sidebar-footer">
        <a href="/logout">로그아웃</a>
      </div>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% endblock %}
</body>
</html>
