<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}로아봇{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  {% block body %}
  <div class="layout">
    <button type="button" class="mobile-menu-btn" id="mobile-menu-btn" aria-label="메뉴 열기">☰</button>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="{{ get_guild_icon_url() or '/static/logo.svg' }}" alt="길드 로고">
        <span>{{ get_guild_name() }}</span>
      </div>
      <div class="sidebar-section-label">메인</div>
      <ul class="sidebar-nav">
        <li><a href="/main" class="{% if active == 'main' %}active{% endif %}">메인</a></li>
        <li><a href="/expedition" class="{% if active == 'expedition' %}active{% endif %}">원정대 관리</a></li>
        <li><a href="/raid-check" class="{% if active == 'raid_check' %}active{% endif %}">레이드 체크</a></li>
        <li><a href="/parties" class="{% if active == 'parties' %}active{% endif %}">공대 모집</a></li>
        <li><a href="/calendar" class="{% if active == 'calendar' %}active{% endif %}">일정 캘린더</a></li>
        <li><a href="/board" class="{% if active == 'board' %}active{% endif %}">커뮤니티 게시판</a></li>
      </ul>
      <div class="sidebar-section-label">도구</div>
      <ul class="sidebar-nav">
        <li><a href="/tools/auction-calculator" class="{% if active == 'auction_calculator' %}active{% endif %}">경매 분배금 계산기</a></li>
      </ul>
      <div class="sidebar-section-label">AI 상담</div>
      <ul class="sidebar-nav">
        <li><a href="/ai-chat" class="nav-primary">+ 새 채팅</a></li>
      </ul>
      <div class="sidebar-section-label">최근</div>
      <ul class="sidebar-sessions">
        {% for s in recent_sessions | default([]) %}
        <li><a href="/chat/{{ s.id }}" class="{% if active_session_id == s.id %}active{% endif %}" title="{{ s.title }}">{{ s.title }}</a></li>
        {% endfor %}
      </ul>
      <div class="sidebar-footer">
        <a href="/logout">로그아웃</a>
      </div>
    </aside>
    <main class="main">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/mobile-nav.js"></script>
  {% endblock %}
</body>
</html>
