{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/flatpickr.min.css">
<div class="page-content">
<a href="/board" class="party-back-link">&larr; 목록으로</a>

{% if error %}
<p class="party-action-error">{{ error }}</p>
{% endif %}

<form method="post" action="/board/create" class="board-write-form">
  <input type="text" name="title" class="board-title-input" placeholder="제목을 입력하세요" maxlength="100" required>

  <div class="board-write-meta">
    <label class="board-write-field">
      <span class="board-write-label">카테고리</span>
      <select name="category" id="category-select" required>
        {% for c in categories %}
        <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </label>

    <label class="board-write-field" id="schedule-field">
      <span class="board-write-label">일정 <small>(선택 — 이벤트는 디스코드 알림에 표시됩니다)</small></span>
      <input type="text" id="scheduled-datetime-input" name="scheduled_datetime" placeholder="날짜/시간 선택">
    </label>
  </div>

  {% include "_board_editor.html" %}

  <button type="submit" class="board-submit-btn">등록</button>
</form>
</div>

<script src="/static/flatpickr.min.js"></script>
<script src="/static/party-datetime.js"></script>
<script src="/static/board-editor.js"></script>
<script>
  initPartyDatetimePicker("#scheduled-datetime-input");
</script>
{% endblock %}
