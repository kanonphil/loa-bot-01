{% extends "base.html" %}
{% block content %}
<link rel="stylesheet" href="/static/flatpickr.min.css">
<div class="page-content">
<a href="/parties" class="party-back-link">&larr; 목록으로</a>
<h1>공대 개설</h1>

{% if error %}
<p class="party-action-error">{{ error }}</p>
{% endif %}

<form method="post" action="/parties/create" class="party-create-form">
  <label>
    레이드
    <select name="raid_name" id="raid-name-select" required>
      {% for raid_name, raid_info in raids.items() %}
      <option value="{{ raid_name }}">{{ raid_info.icon }} {{ raid_info.short_name }}</option>
      {% endfor %}
    </select>
  </label>

  <label>
    난이도
    <select name="difficulty" id="difficulty-select" required></select>
  </label>

  <label>
    숙련도
    <select name="proficiency" required>
      {% for p in proficiency_options %}
      <option value="{{ p.value }}" title="{{ p.description }}">{{ p.label }}</option>
      {% endfor %}
    </select>
  </label>

  <label>
    일정
    <input type="text" id="scheduled-datetime-input" name="scheduled_datetime" placeholder="날짜/시간 선택" required>
  </label>

  <label>
    공지/메모 (선택)
    <input type="text" name="memo" maxlength="150" placeholder="예) 음성 채널 필수">
  </label>

  <label>
    참여할 캐릭터 (선택 — 나중에 직접 참여해도 됩니다)
    <select name="character_name" id="character-name-select">
      <option value="">선택 안 함</option>
      {% for c in characters %}
      <option value="{{ c.character_name }}">{{ c.character_name }} ({{ c.character_class }})</option>
      {% endfor %}
    </select>
  </label>

  <label>
    역할
    <select name="role" id="role-select">
      <option value="dps">딜러</option>
      <option value="support">서포터</option>
    </select>
  </label>

  <button type="submit">공대 개설</button>
</form>
</div>

<script>
  const difficultiesByRaid = {{ difficulties_by_raid_json | safe }};
  const raidSelect = document.getElementById("raid-name-select");
  const diffSelect = document.getElementById("difficulty-select");

  function fillDifficulties() {
    const diffs = difficultiesByRaid[raidSelect.value] || [];
    diffSelect.innerHTML = diffs.map((d) => `<option value="${d}">${d}</option>`).join("");
  }

  raidSelect.addEventListener("change", fillDifficulties);
  fillDifficulties();

  // 딜러 전용 직업은 서포터 역할을 고를 수 없다 (참여 API도 동일하게 검증) — 선택한
  // 캐릭터가 서포터 직업이 아니면 "서포터" 옵션을 막고 자동으로 딜러로 되돌린다.
  const characterIsSupport = {{ character_is_support_json | safe }};
  const characterSelect = document.getElementById("character-name-select");
  const roleSelect = document.getElementById("role-select");
  const supportOption = roleSelect.querySelector('option[value="support"]');

  function updateRoleOptions() {
    const isSupport = characterIsSupport[characterSelect.value];
    supportOption.disabled = characterSelect.value !== "" && !isSupport;
    if (supportOption.disabled && roleSelect.value === "support") {
      roleSelect.value = "dps";
    }
  }

  characterSelect.addEventListener("change", updateRoleOptions);
  updateRoleOptions();
</script>
<script src="/static/flatpickr.min.js"></script>
<script src="/static/party-datetime.js"></script>
<script>
  initPartyDatetimePicker("#scheduled-datetime-input");
</script>
{% endblock %}
