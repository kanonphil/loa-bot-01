{% extends "base.html" %}
{% block content %}
<div class="page-content raid-check-page">
<h1>레이드 체크</h1>

{% if not characters %}
<p>등록된 캐릭터가 없습니다. 디스코드에서 <code>/api등록</code>으로 캐릭터를 먼저 등록해주세요.</p>
{% else %}
<div class="raid-card-grid">
  {% for card in cards %}
  {% set card_index = loop.index0 %}
  {% include "_raid_card.html" %}
  {% endfor %}
</div>
{% endif %}
</div>
{% endblock %}
